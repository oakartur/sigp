# ============================================================
# SIGP - Nginx Reverse Proxy para a VM Ubuntu
# Copie este arquivo para: /etc/nginx/conf.d/sigp.conf
# E execute: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 1180;

    # Frontend React (build estático servido pelo container nginx)
    location /sigp/ {
        proxy_pass         http://localhost:8080/sigp/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API Backend (NestJS)
    location /sigp-api/ {
        proxy_pass         http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 1181;

    # Frontend React (HML)
    location /sigp/ {
        proxy_pass         http://localhost:8081/sigp/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API Backend (HML)
    location /sigp-api/ {
        proxy_pass         http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
